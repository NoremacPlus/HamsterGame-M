<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲測試</title>
    <style>
        /* ==========================================
           CSS 樣式區塊
           ========================================== */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 1. 隱藏原標題 */
        #game-title {
            display: none;
        }

        /* 2. 跑馬燈移至最上方 */
        #marquee-container {
            position: absolute;
            top: 0;
            width: 100%;
            background-color: #333;
            color: #ffcc00;
            padding: 10px 0;
            text-align: center;
            font-weight: bold;
            z-index: 100;
        }

        /* 3. 關卡數縮小 */
        #level-display {
            margin-top: 60px; /* 避開跑馬燈 */
            font-size: 0.8em;
            color: #aaa;
        }

        /* 主要遊戲區域 */
        #game-board {
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
            text-align: center;
        }

        /* 怪物戰鬥區塊 (設定 relative 讓 Boss 按鈕可以絕對定位) */
        #monster-area {
            position: relative;
            background-color: #2a2a2a;
            border: 2px solid #555;
            border-radius: 10px;
            padding: 30px 20px;
            margin-bottom: 20px;
            min-height: 150px;
        }

        /* 4. 打輸 Boss 後的挑戰按鈕 */
        #btn-challenge-boss {
            display: none; /* 預設隱藏 */
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ff4c4c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }
        
        #btn-challenge-boss:hover {
            background-color: #ff1c1c;
        }

        /* 遊戲資訊與按鈕 */
        .stats { margin: 10px 0; font-size: 1.1em; }
        .action-btn {
            background-color: #4CAF50; color: white; border: none;
            padding: 10px 20px; margin: 5px; border-radius: 5px; cursor: pointer;
        }
        
        /* 5. 最新訊息移至最下面 */
        #latest-message-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #222;
            padding: 15px 0;
            text-align: center;
            border-top: 1px solid #444;
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <div id="marquee-container">
        <marquee scrollamount="5">伺服器公告：歡迎來到新版本！盲盒獎項已更新，祝您好運！</marquee>
    </div>

    <h1 id="game-title">這是原本的標題</h1>

    <div id="level-display">第 1 關 (進度: 0/5)</div>

    <div id="game-board">
        
        <div class="stats" id="player-hp-display">玩家 HP: 1000 / 1000</div>

        <div id="monster-area">
            <button id="btn-challenge-boss">挑戰 BOSS</button>
            <h2 id="monster-name">史萊姆 (小怪)</h2>
            <div class="stats" id="monster-hp-display">HP: 100 / 100</div>
            <div class="stats" id="monster-atk-display" style="font-size: 0.9em; color:#ff9999;">攻擊力: 10</div>
        </div>

        <button class="action-btn" onclick="attackMonster()">⚔️ 攻擊怪物</button>
        <button class="action-btn" onclick="openBlindBoxUI()" style="background-color: #9c27b0;">🎁 開啟盲盒</button>

    </div>

    <div id="latest-message-container">
        準備開始戰鬥！
    </div>

    <script>
        // --- 玩家與遊戲狀態 ---
        let currentLevel = 1;
        let monsterKills = 0; // 當前關卡擊殺數
        const killsToBoss = 5; // 殺 5 隻小怪出 Boss

        let playerMaxHp = 1000;
        let playerHp = playerMaxHp;
        let playerAtk = 50; // 測試用玩家攻擊力

        let isBossLevel = false;
        let bossChallengePending = false; // 是否在等待挑戰 Boss 的狀態

        // --- 當前怪物狀態 ---
        let currentMonster = {
            name: "史萊姆",
            maxHp: 100,
            hp: 100,
            atk: 10
        };

        // --- 盲盒獎池 (15種) ---
        const blindBoxPrizes = [
            "SUI 幣 x 10", "BTC 碎片", "ETH 碎片", "DOGE 幣 x 100", "PEPE 幣 x 1000",
            "小型恢復藥劑", "中型恢復藥劑", "基礎攻擊強化", "進階攻擊強化", 
            "爆擊率提升 5%", "爆擊傷害提升 10%", "閃避率提升 5%", 
            "金幣 x 500", "金幣 x 2000", "稀有裝備寶箱"
        ];

        // UI 元素綁定
        const levelDisplay = document.getElementById('level-display');
        const playerHpDisplay = document.getElementById('player-hp-display');
        const monsterName = document.getElementById('monster-name');
        const monsterHpDisplay = document.getElementById('monster-hp-display');
        const monsterAtkDisplay = document.getElementById('monster-atk-display');
        const msgContainer = document.getElementById('latest-message-container');
        const btnChallengeBoss = document.getElementById('btn-challenge-boss');

        // 顯示最新訊息
        function showMessage(msg) {
            msgContainer.innerText = msg;
        }

        // 更新畫面數值
        function updateUI() {
            playerHpDisplay.innerText = `玩家 HP: ${playerHp} / ${playerMaxHp}`;
            monsterName.innerText = isBossLevel ? `🔥 關卡 BOSS 🔥` : `小怪 (第 ${currentLevel} 關)`;
            monsterHpDisplay.innerText = `HP: ${currentMonster.hp} / ${currentMonster.maxHp}`;
            monsterAtkDisplay.innerText = `攻擊力: ${currentMonster.atk}`;
            
            if (bossChallengePending) {
                levelDisplay.innerText = `第 ${currentLevel} 關 (可隨時挑戰 BOSS)`;
            } else {
                levelDisplay.innerText = `第 ${currentLevel} 關 (進度: ${monsterKills}/${killsToBoss})`;
            }
        }

        // --- 核心邏輯：計算怪物數值 ---
        function calculateMonsterStats(level, isBoss) {
            const baseHp = isBoss ? 500 : 100;
            const baseAtk = isBoss ? 50 : 10;
            
            // 血量：平滑成長
            let maxHp = baseHp * (1 + level * 0.15) * Math.pow(1.02, level); 
            // 攻擊力：自然常數 e
            const k = 0.05; 
            let attack = baseAtk * Math.exp(k * level); 

            return { 
                maxHp: Math.floor(maxHp), 
                atk: Math.floor(attack) 
            };
        }

        // --- 生成怪物邏輯 ---
        function spawnNormalMonster() {
            isBossLevel = false;
            let stats = calculateMonsterStats(currentLevel, false);
            currentMonster = { name: "小怪", maxHp: stats.maxHp, hp: stats.maxHp, atk: stats.atk };
            updateUI();
            showMessage(bossChallengePending ? "你正在農小怪，準備好隨時挑戰右上角BOSS！" : "新的小怪出現了！");
        }

        function spawnBossMonster() {
            isBossLevel = true;
            let stats = calculateMonsterStats(currentLevel, true);
            currentMonster = { name: "BOSS", maxHp: stats.maxHp, hp: stats.maxHp, atk: stats.atk };
            updateUI();
            showMessage(`第 ${currentLevel} 關 BOSS 降臨！`);
        }

        // --- 戰鬥互動 ---
        function attackMonster() {
            if (playerHp <= 0) return;

            // 玩家攻擊怪物
            currentMonster.hp -= playerAtk;
            if (currentMonster.hp <= 0) {
                currentMonster.hp = 0;
                onMonsterDefeated();
                return;
            }

            // 怪物反擊玩家
            playerHp -= currentMonster.atk;
            if (playerHp <= 0) {
                playerHp = 0;
                onPlayerDefeated();
            }
            updateUI();
        }

        // 怪物被擊敗
        function onMonsterDefeated() {
            if (isBossLevel) {
                // 打贏 Boss，進入下一關
                showMessage("擊敗 BOSS！進入下一關！");
                currentLevel++;
                monsterKills = 0;
                bossChallengePending = false;
                btnChallengeBoss.style.display = 'none';
                playerHp = playerMaxHp; // 升級回血(測試用)
                spawnNormalMonster();
            } else {
                // 打贏小怪
                if (bossChallengePending) {
                    // 如果正在卡關農小怪狀態，繼續生小怪 (不推進Boss進度)
                    spawnNormalMonster();
                } else {
                    // 正常推進進度
                    monsterKills++;
                    if (monsterKills >= killsToBoss) {
                        spawnBossMonster();
                    } else {
                        spawnNormalMonster();
                    }
                }
            }
        }

        // 玩家被擊敗
        function onPlayerDefeated() {
            if (isBossLevel) {
                // 輸給 Boss
                showMessage("你被 BOSS 擊敗了！退回小怪區提升實力吧！");
                bossChallengePending = true;
                btnChallengeBoss.style.display = 'block'; // 顯示右上角挑戰按鈕
                playerHp = playerMaxHp; // 復活(測試用)
                spawnNormalMonster(); // 回退打小怪
            } else {
                // 輸給小怪 (這邊先簡單處理讓他復活繼續打)
                showMessage("你被小怪擊敗了！重新振作！");
                playerHp = playerMaxHp;
                spawnNormalMonster();
            }
        }

        // --- 點擊挑戰 BOSS 按鈕 ---
        btnChallengeBoss.addEventListener('click', () => {
            bossChallengePending = false;
            btnChallengeBoss.style.display = 'none';
            playerHp = playerMaxHp; // 確保打王前滿血
            spawnBossMonster();
        });

        // --- 開啟盲盒 ---
        function openBlindBoxUI() {
            const prize = blindBoxPrizes[Math.floor(Math.random() * blindBoxPrizes.length)];
            showMessage(`🎁 開啟盲盒獲得：【 ${prize} 】！`);
        }

        // 初始化遊戲
        spawnNormalMonster();

    </script>
</body>
</html>
