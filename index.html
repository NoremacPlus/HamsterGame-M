<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇幻異世界：無限轉蛋機</title>
    <style>
        /* 基礎重置與背景 */
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 5px; }
        p.subtitle { color: #666; margin-bottom: 30px; }

        /* 稀有度顏色 */
        .color-N { color: #808080; border-bottom: 5px solid #808080; }
        .color-R { color: #1E90FF; border-bottom: 5px solid #1E90FF; }
        .color-SR { color: #8A2BE2; border-bottom: 5px solid #8A2BE2; }
        .color-SSR { color: #FFD700; border-bottom: 5px solid #FFD700; text-shadow: 0 0 5px rgba(255,215,0,0.5); }

        /* 輪盤區域 (CSGO 模式) */
        .roulette-container {
            width: 800px;
            max-width: 95%;
            height: 150px;
            margin: 0 auto;
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* 輪盤中央指示線 */
        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background-color: #ff3b3b;
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 0 0 5px rgba(255, 59, 59, 0.8);
        }

        /* 滾動條 */
        .strip {
            display: flex;
            height: 100%;
            width: max-content;
            align-items: center;
        }

        /* 單個蛋的卡片 */
        .egg-card {
            width: 120px;
            height: 120px;
            margin: 0 5px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .egg-card .rarity { font-weight: bold; font-size: 1.2em; margin-bottom: 5px; }
        .egg-card .name { font-size: 0.9em; padding: 0 5px; word-break: break-all; }

        /* 按鈕區域 */
        .controls { margin-top: 30px; }
        button {
            padding: 12px 25px;
            font-size: 1.1em;
            margin: 0 10px;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-draw { background-color: #4CAF50; color: white; box-shadow: 0 4px 6px rgba(76, 175, 80, 0.3); }
        .btn-draw:hover { background-color: #45a049; }
        .btn-fridge { background-color: #2196F3; color: white; box-shadow: 0 4px 6px rgba(33, 150, 243, 0.3); }
        .btn-fridge:hover { background-color: #1e88e5; }

        /* 結果顯示 */
        #result-display {
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
            min-height: 40px;
        }

        /* 冰箱彈出視窗 (Modal) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal {
            background: white;
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .close-btn {
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 30px; height: 30px;
            padding: 0;
            line-height: 30px;
            text-align: center;
        }
        .fridge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            overflow-y: auto;
            flex-grow: 1;
            padding: 5px;
        }
        .inventory-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 5px;
            font-size: 0.85em;
            position: relative;
        }
        .inventory-item .count {
            position: absolute;
            top: -5px; right: -5px;
            background: #333; color: white;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <h1>🥚 轉"蛋" 🥚</h1>
    <p class="subtitle">免費無代價，抽出你的奇蹟！(配率：N 60%, R 25%, SR 10%, SSR 5%)</p>

    <div class="roulette-container">
        <div class="pointer"></div>
        <div class="strip" id="roulette-strip">
            </div>
    </div>

    <div class="controls">
        <button class="btn-draw" id="btn-draw" onclick="roll()">🎰 抽一次</button>
        <button class="btn-fridge" onclick="toggleFridge()">❄️ 打開冰箱</button>
    </div>

    <div id="result-display">等待抽取...</div>

    <div class="modal-overlay" id="fridge-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>❄️ 我的冰箱 (收藏庫)</h2>
                <button class="close-btn" onclick="toggleFridge()">X</button>
            </div>
            <div class="fridge-grid" id="fridge-grid">
                </div>
        </div>
    </div>

<script>
    // 50 種蛋的資料庫 (N: 25, R: 10, SR: 10, SSR: 5)
    const eggs = [
        // SSR (5種)
        { id: 1, name: "創世神龍蛋", rarity: "SSR" }, { id: 2, name: "宇宙星塵蛋", rarity: "SSR" },
        { id: 3, name: "絕對零度冰晶蛋", rarity: "SSR" }, { id: 4, name: "鳳凰涅槃蛋", rarity: "SSR" },
        { id: 5, name: "混沌暗物質蛋", rarity: "SSR" },
        // SR (10種)
        { id: 6, name: "熔岩巨獸蛋", rarity: "SR" }, { id: 7, name: "雷霆風暴蛋", rarity: "SR" },
        { id: 8, name: "聖光天使蛋", rarity: "SR" }, { id: 9, name: "深海巨鯨蛋", rarity: "SR" },
        { id: 10, name: "劇毒沼澤蛋", rarity: "SR" }, { id: 11, name: "幻影精靈蛋", rarity: "SR" },
        { id: 12, name: "霸王龍化石蛋", rarity: "SR" }, { id: 13, name: "極光魔法蛋", rarity: "SR" },
        { id: 14, name: "虛空裂縫蛋", rarity: "SR" }, { id: 15, name: "機械賽博蛋", rarity: "SR" },
        // R (10種)
        { id: 16, name: "火焰鳥蛋", rarity: "R" }, { id: 17, name: "冰霜史萊姆蛋", rarity: "R" },
        { id: 18, name: "寶石甲蟲蛋", rarity: "R" }, { id: 19, name: "黃金野豬蛋", rarity: "R" },
        { id: 20, name: "森林樹精蛋", rarity: "R" }, { id: 21, name: "狂風巨鷹蛋", rarity: "R" },
        { id: 22, name: "岩石石像鬼蛋", rarity: "R" }, { id: 23, name: "幽靈蝙蝠蛋", rarity: "R" },
        { id: 24, name: "劇毒蜘蛛蛋", rarity: "R" }, { id: 25, name: "鐵甲海龜蛋", rarity: "R" },
        // N (25種)
        { id: 26, name: "普通雞蛋", rarity: "N" }, { id: 27, name: "褐色土雞蛋", rarity: "N" },
        { id: 28, name: "白鴨蛋", rarity: "N" }, { id: 29, name: "斑紋鵪鶉蛋", rarity: "N" },
        { id: 30, name: "大鵝蛋", rarity: "N" }, { id: 31, name: "非洲鴕鳥蛋", rarity: "N" },
        { id: 32, name: "小鴿子蛋", rarity: "N" }, { id: 33, name: "綠頭鴨蛋", rarity: "N" },
        { id: 34, name: "烏龜蛋", rarity: "N" }, { id: 35, name: "青蛇蛋", rarity: "N" },
        { id: 36, name: "鱷魚蛋", rarity: "N" }, { id: 37, name: "蜥蜴蛋", rarity: "N" },
        { id: 38, name: "青蛙卵", rarity: "N" }, { id: 39, name: "鮭魚卵", rarity: "N" },
        { id: 40, name: "企鵝蛋", rarity: "N" }, { id: 41, name: "燕子蛋", rarity: "N" },
        { id: 42, name: "貓頭鷹蛋", rarity: "N" }, { id: 43, name: "孔雀蛋", rarity: "N" },
        { id: 44, name: "火雞蛋", rarity: "N" }, { id: 45, name: "鷓鴣蛋", rarity: "N" },
        { id: 46, name: "喜鵲蛋", rarity: "N" }, { id: 47, name: "海鷗蛋", rarity: "N" },
        { id: 48, name: "烏鴉蛋", rarity: "N" }, { id: 49, name: "白鷺蛋", rarity: "N" },
        { id: 50, name: "斑鳩蛋", rarity: "N" }
    ];

    let inventory = {}; // 記錄冰箱內容 { 蛋的id: 數量 }
    let isRolling = false; // 防止連續點擊

    // 根據機率隨機抽出一顆蛋
    function getRandomEgg() {
        const rand = Math.random() * 100;
        let rarityTarget = '';
        
        // 配率: N 60%, R 25%, SR 10%, SSR 5%
        if (rand < 5) rarityTarget = 'SSR';
        else if (rand < 15) rarityTarget = 'SR';
        else if (rand < 40) rarityTarget = 'R';
        else rarityTarget = 'N';

        const pool = eggs.filter(e => e.rarity === rarityTarget);
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // 生成單張卡片的 HTML
    function createEggCard(egg) {
        const card = document.createElement('div');
        card.className = `egg-card color-${egg.rarity}`;
        card.innerHTML = `
            <div class="rarity">${egg.rarity}</div>
            <div class="name">${egg.name}</div>
        `;
        return card;
    }

    // 執行抽獎
    function roll() {
        if (isRolling) return;
        isRolling = true;
        document.getElementById('btn-draw').disabled = true;
        document.getElementById('result-display').innerHTML = "轉動中...";

        const strip = document.getElementById('roulette-strip');
        
        // 重置動畫與位置
        strip.style.transition = 'none';
        strip.style.transform = 'translateX(0px)';
        strip.innerHTML = '';
        
        // 決定這次抽獎的結果
        const winningEgg = getRandomEgg();
        
        // 建立假視覺條，包含 60 個蛋，第 50 個是中獎的蛋
        const totalItems = 60;
        const winningIndex = 50; 

        for (let i = 0; i < totalItems; i++) {
            let eggToShow = (i === winningIndex) ? winningEgg : getRandomEgg();
            strip.appendChild(createEggCard(eggToShow));
        }

        // 強制瀏覽器重繪
        void strip.offsetWidth;

        // 計算停止位置
        // 單個卡片寬度: 120px + margin(5+5) = 130px
        const itemWidth = 130;
        const containerCenter = document.querySelector('.roulette-container').offsetWidth / 2;
        
        // 停在第 50 個物件的中心，加入一點隨機偏移 (-40 到 40 px) 讓它看起來更自然
        const randomOffset = (Math.random() * 80) - 40;
        const stopPosition = (winningIndex * itemWidth) + (itemWidth / 2) - containerCenter + randomOffset;

        // 設定 CSS 動畫
        // cubic-bezier 產生一開始快，後面慢慢停下來的效果 (CSGO 風格)
        strip.style.transition = 'transform 5s cubic-bezier(0.15, 0.85, 0.1, 1)';
        strip.style.transform = `translateX(-${stopPosition}px)`;

        // 5秒後動畫結束，顯示結果並放入冰箱
        setTimeout(() => {
            // 顯示結果文字
            const resultDiv = document.getElementById('result-display');
            resultDiv.innerHTML = `🎉 恭喜獲得：<span class="color-${winningEgg.rarity}">${winningEgg.rarity} - ${winningEgg.name}</span> 🎉`;
            
            // 存入冰箱
            if (inventory[winningEgg.id]) {
                inventory[winningEgg.id]++;
            } else {
                inventory[winningEgg.id] = 1;
            }

            // 恢復按鈕狀態
            isRolling = false;
            document.getElementById('btn-draw').disabled = false;
        }, 5000);
    }

    // 開關冰箱介面
    function toggleFridge() {
        const modal = document.getElementById('fridge-modal');
        if (modal.style.display === 'flex') {
            modal.style.display = 'none';
        } else {
            updateFridgeView();
            modal.style.display = 'flex';
        }
    }

    // 更新冰箱的顯示畫面
    function updateFridgeView() {
        const grid = document.getElementById('fridge-grid');
        grid.innerHTML = ''; // 清空

        // 將有獲得的蛋按照稀有度排序 (SSR -> SR -> R -> N)
        const rarityOrder = { "SSR": 4, "SR": 3, "R": 2, "N": 1 };
        
        const ownedEggs = Object.keys(inventory).map(id => {
            return {
                ...eggs.find(e => e.id === parseInt(id)),
                count: inventory[id]
            };
        }).sort((a, b) => {
            if (rarityOrder[b.rarity] !== rarityOrder[a.rarity]) {
                return rarityOrder[b.rarity] - rarityOrder[a.rarity];
            }
            return a.id - b.id; // 同稀有度按 ID 排
        });

        if (ownedEggs.length === 0) {
            grid.innerHTML = "<p style='grid-column: 1 / -1; color:#999;'>冰箱空空如也，趕快去抽獎吧！</p>";
            return;
        }

        // 渲染每個擁有的蛋
        ownedEggs.forEach(egg => {
            const item = document.createElement('div');
            item.className = `inventory-item color-${egg.rarity}`;
            item.innerHTML = `
                <div class="count">x${egg.count}</div>
                <div style="font-weight:bold; margin-bottom:5px;">${egg.rarity}</div>
                <div>${egg.name}</div>
            `;
            grid.appendChild(item);
        });
    }
</script>
</body>
</html>
