<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>替身戰鬥：Seed Harvester</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1a0033;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: linear-gradient(135deg, #2b0055 0%, #110022 100%);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 2px solid #8a2be2;
        }
        h1 {
            color: #ffd700;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 5px;
        }
        h3 {
            color: #d8bfd8;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .battle-zone {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .enemy-name {
            font-size: 1.5em;
            color: #ff4500;
        }
        .hp-bar-container {
            width: 100%;
            background-color: #333;
            height: 25px;
            border-radius: 12px;
            margin: 10px 0;
            overflow: hidden;
            border: 2px solid #555;
        }
        .hp-bar {
            height: 100%;
            background-color: #ff3333;
            width: 100%;
            transition: width 0.2s;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #00ffcc;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }
        button {
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-attack {
            background-color: #f39c12;
            color: white;
            box-shadow: 0 4px 0 #d68910;
        }
        .btn-skill {
            background-color: #8e44ad;
            color: white;
            box-shadow: 0 4px 0 #732d91;
        }
        .btn-skill:disabled {
            background-color: #555;
            box-shadow: 0 4px 0 #333;
            color: #888;
            cursor: not-allowed;
        }
        .log {
            margin-top: 20px;
            height: 80px;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #00ff00;
            overflow-y: hidden;
            text-align: left;
            border: 1px solid #333;
        }
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, 0, 0); }
            40%, 60% { transform: translate3d(5px, 0, 0); }
        }
        .jojo-text {
            position: absolute;
            font-size: 3em;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px #ffd700;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container" id="gameContainer">
    <h1>替身戰鬥模擬器</h1>
    <h3>本體：倉鼠 | 替身：Seed Harvester</h3>
    
    <div class="battle-zone">
        <div class="enemy-name">敵方：邪惡野貓</div>
        <div class="hp-bar-container">
            <div class="hp-bar" id="enemyHpBar"></div>
        </div>
        <div id="hpText">HP: 1000 / 1000</div>
    </div>

    <div class="stats">
        <div>持有葵花籽：<span id="seedCount">0</span> 粒</div>
    </div>

    <div class="actions">
        <button class="btn-attack" onclick="basicAttack()">倉鼠突擊 (收集種子)</button>
        <button class="btn-skill" id="btnSkill" onclick="standAttack()" disabled>發動替身：Seed Harvester！(需 10 粒種子)</button>
    </div>

    <div class="log" id="battleLog">
        戰鬥開始！敵方野貓出現了！<br>
    </div>
</div>

<script>
    let enemyMaxHp = 1000;
    let enemyHp = 1000;
    let seeds = 0;

    const hpBar = document.getElementById('enemyHpBar');
    const hpText = document.getElementById('hpText');
    const seedDisplay = document.getElementById('seedCount');
    const btnSkill = document.getElementById('btnSkill');
    const battleLog = document.getElementById('battleLog');
    const gameContainer = document.getElementById('gameContainer');

    function logMessage(msg) {
        battleLog.innerHTML = msg + "<br>" + battleLog.innerHTML;
    }

    function updateUI() {
        hpBar.style.width = (enemyHp / enemyMaxHp * 100) + '%';
        hpText.innerText = `HP: ${enemyHp} / ${enemyMaxHp}`;
        seedDisplay.innerText = seeds;
        
        if (seeds >= 10) {
            btnSkill.disabled = false;
            btnSkill.style.animation = "shake 1s infinite";
        } else {
            btnSkill.disabled = true;
            btnSkill.style.animation = "none";
        }

        if (enemyHp <= 0) {
            hpBar.style.width = '0%';
            hpText.innerText = "HP: 0 / 1000";
            logMessage("<span style='color:#ffd700'>戰鬥勝利！敵方再起不能 (Retire)！</span>");
            document.querySelector('.actions').style.display = 'none';
        }
    }

    function basicAttack() {
        if (enemyHp <= 0) return;
        
        let damage = Math.floor(Math.random() * 20) + 10; // 10~30 傷害
        let gainedSeeds = Math.floor(Math.random() * 3) + 1; // 獲得 1~3 顆種子
        
        enemyHp -= damage;
        seeds += gainedSeeds;
        
        logMessage(`本體(倉鼠)發動衝撞！造成 ${damage} 點傷害，收集了 ${gainedSeeds} 粒葵花籽！`);
        
        gameContainer.classList.remove('shake');
        void gameContainer.offsetWidth; // 觸發重繪
        gameContainer.classList.add('shake');
        
        updateUI();
    }

    function showJoJoText() {
        const text = document.createElement('div');
        text.className = 'jojo-text';
        text.innerText = 'ドドドドドド';
        text.style.left = Math.random() * 60 + 20 + '%';
        text.style.top = Math.random() * 60 + 20 + '%';
        document.body.appendChild(text);
        
        let opacity = 1;
        text.style.opacity = opacity;
        
        const fade = setInterval(() => {
            opacity -= 0.05;
            text.style.opacity = opacity;
            text.style.transform = `translateY(-${(1-opacity)*50}px)`;
            if (opacity <= 0) {
                clearInterval(fade);
                text.remove();
            }
        }, 50);
    }

    function standAttack() {
        if (enemyHp <= 0 || seeds < 10) return;
        
        seeds -= 10;
        let damage = Math.floor(Math.random() * 150) + 200; // 200~350 爆發傷害
        enemyHp -= damage;
        
        logMessage(`<span style='color:#ff00ff; font-weight:bold;'>Seed Harvester 顯現！「種子機關槍！」造成 ${damage} 點巨大傷害！</span>`);
        
        // 畫面震動與特效
        gameContainer.classList.remove('shake');
        void gameContainer.offsetWidth; 
        gameContainer.classList.add('shake');
        
        for(let i=0; i<5; i++) {
            setTimeout(showJoJoText, i * 200);
        }
        
        updateUI();
    }
</script>
</body>
</html>
